name: Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-docs:
    name: Check Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Check Documentation
        run: make check-docs

  check-repos:
    name: Check Repositories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Check Repositories
        run: make check-repos

  check-swagger-ids:
    name: Check Swagger IDs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Swagger IDs
        run: make check-swagger-ids

  check-filters:
    name: Check Filters Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Check Filters Sync
        run: make check-filters
