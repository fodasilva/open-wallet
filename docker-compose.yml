services:
  postgres:
    image: postgres:15-alpine
    container_name: open-wallet-db
    restart: on-failure
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: docker
    networks:
      - app-network

  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: jaeger
    restart: on-failure
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
      - JAEGER_DISABLED=false
      - LOG_LEVEL=info
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686" # Jaeger UI
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "9411:9411"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: open-wallet-redis
    restart: always
    ports:
      - 6379:6379
    command: redis-server --maxmemory 30mb --maxmemory-policy allkeys-lru
    networks:
      - app-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: always
    ports:
      - "8001:8001"
    environment:
      - RI_APP_PORT=8001
      - RI_APP_HOST=0.0.0.0
    networks:
      - app-network
      
networks:
  app-network:
    driver: bridge