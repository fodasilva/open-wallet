info:
  contact: {}
  title: Open Wallet API
paths:
  /auth/login/google:
    post:
      consumes:
      - application/json
      description: Authenticates user with Google OAuth
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_resources_auth.LoginGoogleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User logged in
          schema:
            $ref: '#/definitions/internal_resources_auth.LoginGoogleResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      summary: Login with Google
      tags:
      - auth
  /categories:
    get:
      consumes:
      - application/json
      description: List categories
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Sort field
        example: name:asc,created_at:desc
        in: query
        name: order_by
        type: string
      - description: Category filter
        in: query
        name: filter
        type: string
      - description: A category name to filter by
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of categories
          schema:
            $ref: '#/definitions/internal_resources_categories.ListCategoriesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Create a category
      parameters:
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_resources_categories.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Category created
          schema:
            $ref: '#/definitions/internal_resources_categories.CreateCategoryResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Create a category
      tags:
      - categories
  /categories/{category_id}:
    delete:
      consumes:
      - application/json
      description: Delete a category
      parameters:
      - description: category ID
        in: path
        name: category_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Category deleted
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Delete Category By ID
      tags:
      - categories
    patch:
      consumes:
      - application/json
      description: Update a category
      parameters:
      - description: category ID
        in: path
        name: category_id
        required: true
        type: string
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_resources_categories.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Category updated
          schema:
            $ref: '#/definitions/internal_resources_categories.UpdateCategoryResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Update Category By ID
      tags:
      - categories
  /categories/{period}:
