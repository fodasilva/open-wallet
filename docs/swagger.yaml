        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: List recurrences
      tags:
      - recurrences
    post:
      consumes:
      - application/json
      description: Create a new recurrence template
      operationId: v1CreateRecurrence
      parameters:
      - description: Recurrence payload
        in: body
        name: body
