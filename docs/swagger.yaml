      consumes:
      - application/json
      description: List categories with amount per period
      parameters:
      - description: period
        in: path
        name: period
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: Category filter
        in: query
        name: filter
        type: string
      - description: Sort field
