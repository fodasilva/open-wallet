info:
  contact: {}
  description: This is the Open Wallet API.
  title: Open Wallet API
  version: "1.0"
paths:
  /api/v1/auth/login/google:
    post:
      consumes:
      - application/json
      description: Authenticates user with Google OAuth
      operationId: v1LoginWithGoogle
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_resources_auth_handlers.LoginGoogleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User logged in
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.ResponseData-internal_resources_auth_handlers_LoginGoogleResponseData'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      summary: Login with Google
      tags:
      - auth
  /api/v1/categories:
    get:
      consumes:
      - application/json
      description: List categories
      operationId: v1ListCategories
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: "Sort field. \n- Allowed: name, created_at, id"
        example: name:asc
        in: query
        name: order_by
        type: string
      - description: "Filter expression. \n- Allowed fields & ops:\n  - color: eq,
          in\n  - created_at: eq, gt, gte, lt, lte\n  - id: eq, in\n  - name: eq,
          like, in\n  - user_id: eq, in\n"
        in: query
        name: filter
        type: string
      - description: A category name to filter by
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of categories
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.PaginatedResponse-internal_resources_categories_handlers_ListCategoriesResponseData'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Create a category
      operationId: v1CreateCategory
      parameters:
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_resources_categories_handlers.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Category created
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.ResponseData-internal_resources_categories_handlers_CreateCategoryResponseData'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Create a category
      tags:
      - categories
  /api/v1/categories/{category_id}:
    delete:
      consumes:
      - application/json
      description: Delete a category
      operationId: v1DeleteCategory
      parameters:
      - description: category ID
        in: path
        name: category_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Category deleted
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Delete Category By ID
      tags:
      - categories
    patch:
      consumes:
      - application/json
      description: Update a category
      operationId: v1UpdateCategory
      parameters:
      - description: category ID
        in: path
        name: category_id
        required: true
        type: string
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_resources_categories_handlers.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Category updated
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.ResponseData-internal_resources_categories_handlers_UpdateCategoryResponseData'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Update Category By ID
      tags:
      - categories
  /api/v1/categories/{period}:
    get:
      consumes:
      - application/json
      description: List categories with amount per period
      operationId: v1ListCategoryAmountPerPeriod
      parameters:
      - description: period
        in: path
        name: period
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: "Filter expression. \n- Allowed fields & ops:\n  - color: eq,
          in\n  - id: eq, in\n  - name: eq, like, in\n  - period: eq, in\n  - total_amount:
          eq, gt, gte, lt, lte\n  - user_id: eq, in\n"
        in: query
        name: filter
        type: string
      - description: "Sort field. \n- Allowed: name, total_amount, period, id"
        example: name:asc
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of categories with amount per period
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.PaginatedResponse-internal_resources_categories_handlers_ListCategoryAmountPerPeriodResponseData'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: List categories with amount per period
      tags:
      - categories
