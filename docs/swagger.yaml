            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: List recurrences
      tags:
      - recurrences
    post:
      consumes:
      - application/json
      description: Create a new recurrence template
      parameters:
      - description: Recurrence payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_resources_recurrences.CreateRecurrenceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Recurrence created
          schema:
            $ref: '#/definitions/internal_resources_recurrences.CreateRecurrenceResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Create a recurrence
      tags:
      - recurrences
  /recurrences/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a recurrence template
      parameters:
      - description: recurrence ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Recurrence deleted
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Delete Recurrence By ID
      tags:
      - recurrences
    patch:
      consumes:
      - application/json
      description: Update a recurrence template
      parameters:
      - description: recurrence ID
        in: path
        name: id
        required: true
        type: string
      - description: Recurrence payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_resources_recurrences.UpdateRecurrenceRequest'
      produces:
      - application/json
      responses:
