          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: List entries
      tags:
      - transactions
  /api/v1/transactions/summary:
    get:
      consumes:
      - application/json
      description: |-
        Returns total income, expense and balance for each month in the specified period range.
        REQUIRED: period gte 'YYYYMM' and period lte 'YYYYMM' (max 12 months range)
        Note: Only periods with existing transactions/entries will be returned.
      operationId: v1GetSummary
      parameters:
      - description: "Filter expression. \n- Allowed fields & ops:\n  - period: eq,
          in, gte, lte\n  - total_balance: eq, gt, gte, lt, lte\n  - total_expense:
          eq, gt, gte, lt, lte\n  - total_income: eq, gt, gte, lt, lte\n"
        in: query
        name: filter
        type: string
      - description: "Sort field. \n- Allowed: period, total_expense, total_income,
          total_balance"
        example: period:asc
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Summary data
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.ResponseData-internal_resources_transactions_handlers_SummaryResponseData'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: Get financial summary grouped by month
      tags:
      - transactions
