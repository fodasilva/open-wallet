        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
      security:
      - BearerAuth: []
      summary: List categories with amount per period
      tags:
      - categories
  /recurrences:
    get:
      consumes:
      - application/json
      description: List user recurrences
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of recurrences
          schema:
            $ref: '#/definitions/internal_resources_recurrences.ListRecurrencesResponse'
        "401":
          description: Unauthorized
