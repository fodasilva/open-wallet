  /api/v1/transactions/entries:
    get:
      consumes:
      - application/json
      description: List a detailed view of entries joined with transactions for a
        given period
      operationId: v1ListEntries
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      - description: "Filter expression. \n- Allowed fields & ops:\n  - amount: eq,
          gt, gte, lt, lte\n  - category_id: eq, in\n  - created_at: eq, gt, gte,
          lt, lte\n  - id: eq, in\n  - period: eq, in, gte, lte\n  - reference_date:
          eq, gt, gte, lt, lte\n  - transaction_id: eq, in\n  - type: eq, in\n  -
          user_id: eq, in\n"
        in: query
        name: filter
        type: string
      - description: "Sort field. \n- Allowed: reference_date, amount, id, created_at"
        example: reference_date:asc
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of entries
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.PaginatedResponse-internal_resources_transactions_handlers_ListEntriesResponseData'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_felipe1496_open-wallet_internal_utils.HTTPError'
        "500":
